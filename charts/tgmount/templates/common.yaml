{{/* Preprocess values and prepare config file */}}
{{- define "tgmount.preprocess" -}}
secrets:
  {{- if and (hasKey (.Values.secret) "tgapp") (not (empty .Values.secret.tgapp)) }}
  {{- if .Values.secret.tgapp.existing_secret }}
    {{- if .Values.secret.tgapp.tgapp }}
      {{- fail "Cannot provide TGAPP tgapp.existing_secret is set." }}
    {{- end }}
  {{- else }}
  tgapp:
    suffix: tgapp
    stringData:
      TGAPP: {{ required "TGAPP secret is required" .Values.secret.tgapp.tgapp }}
  {{- end }}
  {{- end }}

controllers:
  main:
    type: statefulset
    replicas: {{ .Values.replicas | default 1 }}
    pod:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    defaultContainerOptions:
      {{- with .Values.args }}
      args:
        {{- toYaml . | nindent 8 }}
      {{- end }}

    containers:
      main:
        image:
          {{- toYaml .Values.image | nindent 10 }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: true
          privileged: true
        envFrom:
          {{- if and (hasKey (.Values.secret) "tgapp") (not (empty .Values.secret.tgapp)) }}
          - name: tgapp
            secretRef:
            {{- if .Values.secret.tgapp.existing_secret }}
              name: {{ .Values.secret.tgapp.existing_secret }}
            {{- else }}
              identifier: tgapp
            {{- end }}
          {{- end }}

{{- end -}}
{{- $_ := merge .Values (include "tgmount.preprocess" . | fromYaml) -}}

{{/* Render the templates */}}
{{- include "bjw-s.common.loader.all" . }}
