#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml
#

image:
# # -- image repository
  repository: ghcr.io/navidrome/navidrome
# # -- image pull policy
  pullPolicy: IfNotPresent
# # -- image tag
  tag: 0.61.2@sha256:9fa40b3d8dec43ceb2213d1fa551da3dcfef6ac6d19c2e534efb92527c2bafd2

secret:
  {}
# # -- Specify these secrets for integrations enablement
# # LastFM Options:
# # A) Not to pass anything if you want to disable LastFM integration
# # -- requires setting up `LastFM.Enabled: true` in config to take effect
# # [[ref]](https://www.navidrome.org/docs/usage/configuration/options/#advanced-configuration)
# # B) lastfm:
# #      api_key: super_secret_api_key
# #      secret: super_secret_secret
# # C) lastfm:
# #      existing_secret: super_secret_existing_lastfm_secret
# # Prometheus Options:
# # A) Not to pass anything if you want to disable Prometheus authentication
# # -- requires setting up `Prometheus.Enabled: true` in config to take effect
# # [[ref]](https://www.navidrome.org/docs/usage/configuration/options/#advanced-configuration)
# # B) prometheus:
# #      password: super_secret_password
# # C) prometheus:
# #      existing_secret: super_secret_existing_prometheus_secret


podSecurityContext:
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true  # migrations fail when rootfs is read-only
  runAsUser: 65534
  runAsGroup: 65534


config:
# # -- Config has to include only "In config file" references, not environmental variables
# #    [[ref]](https://www.navidrome.org/docs/usage/configuration/options/#available-options)
  MusicFolder: /music
  DataFolder: /data
  CacheFolder: /cache


persistence:
# # -- Further configuration options are available here
# #    [[ref]](https://github.com/bjw-s-labs/helm-charts/blob/common-4.6.2/charts/library/common/values.yaml#L728)
  music:
    accessMode: ReadWriteOnce
    size: 10Gi
#   # -- If you want to use another mount point than /music, you can set it in config
#   #    and use advancedMounts to mount it to the right place in the container
    advancedMounts:
      main:
        main:
          - path: "/music"
            readOnly: true
  data:
    accessMode: ReadWriteOnce
    size: 1Gi
#   # -- If you want to use another mount point than /data, you can set it in config
#   #    and use advancedMounts to mount it to the right place in the container
    advancedMounts:
      main:
        main:
          - path: "/data"
            readOnly: false
  cache:
    type: emptyDir
    accessMode: ReadWriteOnce
    size: 1Gi
#   # -- If you want to use another mount point than /cache, you can set it in config
#   #    and use advancedMounts to mount it to the right place in the container
    advancedMounts:
      main:
        main:
          - path: "/cache"
            readOnly: false

#   # -- Example backup configuration
#   #    includes Backup.Path, Backup.Schedule and Backup.Count in config
#   #    [[ref]](https://www.navidrome.org/docs/usage/configuration/options/#advanced-configuration)
#   # backup:
#   #    accessMode: ReadWriteOnce
#   #    size: 10Gi
#   #    advancedMounts:
#   #      main:
#   #        main:
#   #          - path: "/backup"
#   #            readOnly: false


ingress:
# # -- Further ingress configuration options are available here
# #    [[ref]](https://github.com/bjw-s-labs/helm-charts/blob/common-4.6.2/charts/library/common/values.yaml#L585)
  main:
    enabled: false
#   # ingressClassName: nginx-public
#   # annotations:
#   #   cert-manager.io/cluster-issuer: letsencrypt-http01
    hosts: []
#   #   - host: navidrome.example.com
#   #     paths:
#   #       - path: /
#   #         service:
#   #           identifier: http
#   #           port: http
    tls: []
#   #   - secretName: navidrome-cert
#   #     hosts:
#   #       - navidrome.example.com
