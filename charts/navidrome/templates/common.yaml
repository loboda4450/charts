{{/* Preprocess values and prepare config file */}}
{{- define "navidrome.preprocess" -}}

{{ if .Values.secret }}
secrets:
  {{- if and (hasKey (.Values.secret) "lastfm") (not (empty .Values.secret.lastfm)) }}
  {{- if .Values.secret.lastfm.existing_secret }}
    {{- if or .Values.secret.lastfm.api_key .Values.secret.lastfm.secret }}
      {{- fail "Cannot provide LastFM api_key/secret when lastfm.existing_secret is set." }}
    {{- end }}
  {{- else }}
  lastfm:
    suffix: lastfm
    stringData:
      ND_LASTFM_APIKEY: {{ required "LastFM API Key is required if LastFM is enabled" .Values.secret.lastfm.api_key }}
      ND_LASTFM_SECRET: {{ required "LastFM API Secret is required if LastFM is enabled" .Values.secret.lastfm.secret }}
  {{- end }}
  {{- end }}

  {{- if and (hasKey (.Values.secret) "prometheus") (not (empty .Values.secret.prometheus)) }}
  {{- if .Values.secret.prometheus.existing_secret }}
    {{- if .Values.secret.prometheus.password }}
      {{- fail "Cannot provide Prometheus password when existing_secret is set." }}
    {{- end }}
  {{- else }}
  prometheus:
    suffix: prometheus
    stringData:
      ND_PROMETHEUS_PASSWORD: {{ required "Prometheus password is required when set" .Values.secret.prometheus.password }}
  {{- end }}
  {{- end }}
{{ end }}

configMaps:
  {{- if .Values.config }}
  config:
    suffix: config
    data:
      navidrome.toml: |
        {{- include "navidrome.validateSensitiveConfig" . }}
        {{- include "navidrome.validateNDConfig" . }}
        {{- .Values.config | toToml | nindent 8 }}
  {{- end }}

persistence:
  {{- if .Values.config }}
  config:
    type: configMap
    identifier: config
    advancedMounts:
      navidrome:
        navidrome:
          - path: /data/navidrome.toml
            subPath: navidrome.toml
  {{- end }}

service:
  http:
    type: ClusterIP
    controller: navidrome
    ports:
      http:
        port: {{ dig "PORT" 4533 .Values.config }}

controllers:
  navidrome:
    type: statefulset
    replicas: {{ .Values.replicas | default 1 }}
    pod:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    containers:
      navidrome:
        image:
          {{- toYaml .Values.image | nindent 10 }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        env:
          - name: ND_MUSICFOLDER
            value: ""
          - name: ND_DATAFOLDER
            value: ""
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: {{ default 4533 (index .Values "config" "PORT") }}
                scheme: HTTP
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: {{ default 4533 (index .Values "config" "PORT") }}
                scheme: HTTP
              initialDelaySeconds: 0
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 1
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: {{ default 4533 (index .Values "config" "PORT") }}
                scheme: HTTP
              initialDelaySeconds: 0
              # -- Navidrome can take a long time to start with large libraries due to database migrations being
              #    bound to main process, we can't run them separately, so we set a high failure threshold
              failureThreshold: 120
              periodSeconds: 10
              timeoutSeconds: 1

        {{ if .Values.secret }}
        envFrom:
          {{- if and (hasKey (.Values.secret) "lastfm") (not (empty .Values.secret.lastfm)) }}
          {{- include "navidrome.validateSecret" (dict "context" . "service" .Values.secret.lastfm "name" "LastFM") }}
          - name: lastfm
            secretRef:
            {{- if .Values.secret.lastfm.existing_secret }}
              name: {{ .Values.secret.lastfm.existing_secret }}
            {{- else }}
              identifier: lastfm
            {{- end }}
          {{- end }}

          {{- if and (hasKey (.Values.secret) "prometheus") (not (empty .Values.secret.prometheus)) }}
          {{- include "navidrome.validateSecret" (dict "context" . "service" .Values.secret.prometheus "name" "Prometheus") }}
          - name: prometheus
            secretRef:
              {{- if .Values.secret.prometheus.existing_secret }}
              name: {{ .Values.secret.prometheus.existing_secret }}
              {{- else }}
              identifier: prometheus
              {{- end }}
          {{- end }}
        {{- end }}
{{ end }}
{{- $_ := merge .Values (include "navidrome.preprocess" . | fromYaml) -}}

{{/* Render the templates */}}
{{- include "bjw-s.common.loader.all" . }}
