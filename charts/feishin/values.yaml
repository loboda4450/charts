image:
# # -- image repository
  repository: ghcr.io/jeffvli/feishin
# # -- image pull policy
  pullPolicy: IfNotPresent
# # -- image tag
  tag: 1.11.0@sha256:1eed97d6272d29d0a7de4c3c1357d4bc9c08cf8e304aa1014089f9111d22619c

env:
  {}
# # -- Example configuration for Navidrome
# # SERVER_NAME: Navidrome
# # SERVER_LOCK: true
# # SERVER_TYPE: navidrome
# # SERVER_URL: https://navidrome.example.com

service:
  http:
    type: ClusterIP
    controller: main
    ports:
      http:
        port: 9180

ingress:
# # -- Further ingress configuration options are available here
# #    [[ref]](https://github.com/bjw-s-labs/helm-charts/blob/common-4.6.2/charts/library/common/values.yaml#L585)
  main:
    enabled: false
#   # ingressClassName: nginx-public
#   # annotations:
#   #   cert-manager.io/cluster-issuer: letsencrypt-http01
    hosts: []
#   #   - host: feishin.example.com
#   #     paths:
#   #       - path: /
#   #         service:
#   #           identifier: http
#   #           port: http
    tls: []
#   #   - secretName: feishin-cert
#   #     hosts:
#   #       - feishin.example.com
